name: Documentation & Mapping Linter
on: [push, pull_request]

jobs:
  validate-mapping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verify JSON Schema
        run: |
          # Simple check to ensure system-mapping.json is valid
          jq '.' data/system-mapping.json
      - name: Terminology Check
        run: |
          # Ensure no deprecated terms like "Fix" are in the docs
          grep -rv "Fix" docs/ || exit 1