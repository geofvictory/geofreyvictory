services:
  gateway:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../src:/app
    labels:
      - "traefik.http.routers.docs.rule=PathPrefix(`/`)"
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
      - "traefik.http.routers.docs.priority=1" # Low priority
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --port 3000"

  search:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_MASTER_KEY=well_ordered_key_123
    ports:
      - "7700:7700"
    labels:
      - "traefik.http.routers.search.rule=PathPrefix(`/api/search`)" 
      - "traefik.http.services.search.loadbalancer.server.port=7700"
      - "traefik.http.routers.search.priority=10" # Higher priority