services:
  # The Edge: Reverse Proxy & Load Balancer
  gateway:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"       # Web Traffic
      - "8080:8080"   # Traefik Dashboard (to show your system health)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # The Content: Your Documentation Engine
 docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../src:/app
    labels:
      - "traefik.http.routers.docs.rule=Host(`localhost`)"
      - "traefik.http.services.docs.loadbalancer.server.port=3000" # Add this line
    command: sh -c "npm install && npm start -- --host 0.0.0.0 --port 3000"
  search:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_MASTER_KEY=well_ordered_key_123
    ports:
      - "7700:7700"
    labels:
      - "traefik.http.routers.search.rule=Host(`search.localhost`)"