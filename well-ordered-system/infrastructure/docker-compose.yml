services:
  gateway:
    image: traefik:v2.10
    networks:
      - well-ordered-net
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=well-ordered-net" # Matches your network name
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  docs:
    image: node:20-alpine
    networks:
      - well-ordered-net
    working_dir: /app
    volumes:
      - ../src:/app
    # Add this to tell Docker "Yes, this container uses 3000"
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.docs.rule=PathPrefix(`/`)"
      - "traefik.http.routers.docs.entrypoints=web"
      - "traefik.http.services.docs.loadbalancer.server.port=3000"
    command: sh -c "npm install && npx docusaurus start --host 0.0.0.0 --port 3000"

  search:
    image: getmeili/meilisearch:latest
    networks:
      - well-ordered-net
    environment:
      - MEILI_MASTER_KEY=well_ordered_key_123
    ports:
      - "7700:7700"
    labels:
      - "traefik.http.routers.search.rule=PathPrefix(`/api/search`)" 
      - "traefik.http.services.search.loadbalancer.server.port=7700"
      - "traefik.http.routers.search.priority=10" # Higher priority
  
networks:
  well-ordered-net:
    driver: bridge