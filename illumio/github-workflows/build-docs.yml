name: Docs Pipeline

on:
  pull_request:
    paths:
      - 'content/**'

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate XML Structure
        run: |
          # Ensuring all DITA files are well-formed
          find content/ -name "*.xml" | xargs xmllint --noout

      - name: Render Mermaid to SVG
        uses: neenjaw/mermaid-cli-action@v2
        with:
          files: 'content/diagrams/*.mmd'
          outputDir: 'output/images'

      - name: Check for Broken Links
        uses: lycheeverse/lychee-action@v1
        with:
          args: content/**/*.xml